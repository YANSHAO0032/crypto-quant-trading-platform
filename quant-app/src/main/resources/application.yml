server:
  port: 8080

spring:
  application:
    name: crypto-quant-trading-platform
  profiles:
    active: dev

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.quant.common.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

# Binance API配置
binance:
  api-key: ${BINANCE_API_KEY:}
  secret-key: ${BINANCE_SECRET_KEY:}
  base-url: https://api.binance.com
  ws-url: wss://stream.binance.com:9443/ws

# 风控配置
risk:
  max-order-amount: 100000     # 单笔最大金额(USDT)
  max-position: 10             # 单品种最大持仓量
  max-order-per-minute: 60     # 每分钟最大下单次数(按策略ID计)
  fatal-loss-rate: 0.2         # 全局止损阈值(账户亏损20%时告警)
  kline-timeout-seconds: 120   # 行情心跳超时秒数

# 订单服务配置
order:
  max-position-per-strategy: 3  # 每个策略最大同时持仓订单数

# 策略配置
strategy:
  grid:
    upper-price: 70000
    lower-price: 60000
    grid-count: 10
