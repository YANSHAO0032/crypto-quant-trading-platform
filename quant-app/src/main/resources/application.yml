server:
  port: 8080

spring:
  application:
    name: crypto-quant-trading-platform
  profiles:
    active: dev

# K线导入线程池
kline:
  import:
    threads: 4  # 并发导入线程数，建议不超过数据库连接池大小

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.quant.common.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

# Binance API配置
binance:
  api-key: ${BINANCE_API_KEY:}
  secret-key: ${BINANCE_SECRET_KEY:}
  base-url: https://api.binance.com
  ws-url: wss://stream.binance.com:9443/ws/
  user-stream:
    enabled: false  # 实盘时设为 true，需配置有效 api-key

# 风控配置
risk:
  max-order-amount: 100000     # 单笔最大金额(USDT)
  max-position: 10             # 单品种最大持仓量
  max-order-per-minute: 60     # 每分钟最大下单次数(按策略ID计)
  fatal-loss-rate: 0.2         # 全局止损阈值(账户亏损20%时告警)
  kline-timeout-seconds: 120   # 行情心跳超时秒数

# 订单服务配置
order:
  max-position-per-strategy: 3  # 每个策略最大同时持仓订单数

# 钱包配置
wallet:
  default-usdt: 10000  # API Key未配置时的默认初始USDT余额

# 策略配置
strategy:
  order-quantity: 0.001  # 每笔订单名义数量（BTC单位），实盘应按资金动态计算
  grid:
    upper-price: 70000
    lower-price: 60000
    grid-count: 10
  ma:
    short-period: 5
    long-period: 20
  rsi:
    period: 14
    oversold: 30
    overbought: 70

backtest:
  fee-rate: 0.001
